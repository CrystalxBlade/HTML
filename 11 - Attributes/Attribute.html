<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Attributes</title>
</head>
<body>

    <h1>HTML Attributes</h1>

    <h2>1. id Attribute</h2>

    <p id="intro">
        This paragraph has an id called "intro".
    </p>

    <hr>

    <h2>2. class Attribute</h2>

    <p class="note">First note.</p>
    <p class="note">Second note.</p>

    <hr>

    <h2>3. name Attribute</h2>

    <form>
        Name:
        <input type="text" name="username">
    </form>

    <hr>

    <h2>4. title Attribute</h2>

    <p title="Hover over me">
        Move your mouse here.
    </p>

    <hr>

    <h2>5. style Attribute</h2>

    <p style="color: blue;">
        Inline CSS Example
    </p>

</body>
</html>
